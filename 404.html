<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — RankRise Digital</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070d;--surf:#0d0d1a;--card:#111120;--bdr:rgba(255,255,255,.07);--acc:#ff5c35;--acc2:#ffb830;--txt:#eeedf8;--mut:#6b6b8a;--mut2:#9898b5}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;line-height:1.7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-family:'Syne',system-ui,sans-serif;font-weight:800;font-size:clamp(4rem,15vw,9rem);line-height:1;color:var(--acc);opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none;z-index:0}
.content{position:relative;z-index:1}
h2{font-family:'Syne',system-ui,sans-serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin-bottom:.6rem}
p{color:var(--mut2);margin-bottom:2rem;font-size:1rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;font-family:inherit;font-weight:700;font-size:.92rem;padding:.78rem 1.8rem;border-radius:9px;border:none;cursor:pointer;text-decoration:none;transition:all .22s;white-space:nowrap;margin:.3rem}
.btn-p{background:var(--acc);color:#fff;box-shadow:0 4px 22px rgba(255,92,53,.3)}.btn-p:hover{transform:translateY(-2px)}
.btn-o{border:1px solid var(--bdr);color:var(--txt)}.btn-o:hover{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.04)}
nav{position:fixed;top:0;left:0;width:100%;background:rgba(7,7,13,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:0 5vw;height:64px;display:flex;align-items:center}
.logo{font-family:'Syne',system-ui,sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--txt)}
.logo em{color:var(--acc);font-style:normal}
.logo-dot{width:8px;height:8px;background:var(--acc);border-radius:50%;display:inline-block;margin-right:.4rem}
</style>
</head>
<body>
<nav>
  <a href="/digital-marketing/index.html" class="logo"><span class="logo-dot"></span>Rank<em>Rise</em> Digital</a>
</nav>
<h1>404</h1>
<div class="content">
  <h2>Page Not Found</h2>
  <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
  <div>
    <a href="/digital-marketing/index.html" class="btn btn-p">🏠 Go Home</a>
    <a href="/digital-marketing/blog.html" class="btn btn-o">📝 Visit Blog</a>
    <a href="/digital-marketing/contact.html" class="btn btn-o">📞 Contact Us</a>
  </div>
</div>
</body>
</html>
